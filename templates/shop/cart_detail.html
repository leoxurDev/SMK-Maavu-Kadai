{% extends 'base.html' %}

{% block title %}SMK Flour Shop - Shopping Cart{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto; background-color: white; border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; box-shadow: var(--shadow-md);">
    <h2 style="font-size: 1.4rem; color: var(--dark-brown); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem;">
        <i class="fa-solid fa-shopping-basket" style="color: var(--banana-leaf);"></i>
        <span>உங்களது கூடை / Your Shopping Cart</span>
    </h2>

    <div id="cart-page-target"
         hx-get="{% url 'cart_drawer' %}"
         hx-trigger="cartUpdated from:body">
        {% include 'shop/partials/cart_drawer_content.html' %}
    </div>
</div>
{% endblock %}
