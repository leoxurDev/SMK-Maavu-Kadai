{% extends 'base.html' %}

{% block title %}SMK Flour Shop - Delivery Staff Login{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 3rem auto; padding: 0 1rem; box-sizing: border-box;">
    
    <!-- Login Card -->
    <div style="background-color: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 20px; padding: 2rem; box-shadow: var(--shadow-lg);">
        
        <!-- Header -->
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <div style="background-color: var(--terracotta); color: white; width: 50px; height: 50px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 0.8rem; box-shadow: var(--shadow-sm);">
                <i class="fa-solid fa-truck-ramp-box"></i>
            </div>
            <h2 style="font-size: 1.25rem; font-weight: 700; color: var(--text-primary); margin: 0;">Delivery Staff Login</h2>
            <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.2rem;">Access your assigned delivery routes and orders</p>
        </div>

        {% if error_msg %}
            <div style="background-color: rgba(255, 69, 58, 0.1); border: 1px solid rgba(255, 69, 58, 0.2); color: var(--danger-color); font-size: 0.8rem; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>{{ error_msg }}</span>
            </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" action="{% url 'delivery_login' %}" style="display: flex; flex-direction: column; gap: 1rem;">
            {% csrf_token %}
            
            <div style="display: flex; flex-direction: column; gap: 0.35rem;">
                <label for="id_username" style="font-size: 0.75rem; font-weight: 600; color: var(--text-secondary);">Username</label>
                <input type="text" name="username" id="id_username" required 
                       style="height: 42px; border: 1px solid var(--border-color); border-radius: 8px; padding: 0 0.8rem; font-size: 0.9rem; outline: none; background-color: var(--input-bg); color: var(--text-primary); transition: var(--transition-smooth);"
                       onfocus="this.style.borderColor='var(--accent-color)'"
                       onblur="this.style.borderColor='var(--border-color)'"
                       placeholder="Enter delivery staff username">
            </div>

            <div style="display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.5rem;">
                <label for="id_password" style="font-size: 0.75rem; font-weight: 600; color: var(--text-secondary);">Password</label>
                <input type="password" name="password" id="id_password" required 
                       style="height: 42px; border: 1px solid var(--border-color); border-radius: 8px; padding: 0 0.8rem; font-size: 0.9rem; outline: none; background-color: var(--input-bg); color: var(--text-primary); transition: var(--transition-smooth);"
                       onfocus="this.style.borderColor='var(--accent-color)'"
                       onblur="this.style.borderColor='var(--border-color)'"
                       placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary" style="height: 44px; font-weight: 700; font-size: 0.9rem; margin-top: 0.4rem; cursor: pointer; border-radius: 10px;">
                Log In & View Routes
            </button>
        </form>
    </div>
</div>
{% endblock %}
