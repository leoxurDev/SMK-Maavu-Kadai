services:

  db:
    image: mysql:8.0
    container_name: smk_db
    restart: always
    environment:
      MYSQL_DATABASE: smk_flour_shop
      MYSQL_USER: smk_user
      MYSQL_PASSWORD: smk_password
      MYSQL_ROOT_PASSWORD: smk_root_password
    # Expose only to loopback interface (localhost) for secure SSH tunneling admin access
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s


  redis:
    image: redis:7-alpine
    container_name: smk_redis
    restart: always
    # Restrict Redis ports to localhost only
    ports:
      - "127.0.0.1:6379:6379"

  web:
    build: .
    container_name: smk_web
    restart: always
    # Serves the app using production Gunicorn
    command: gunicorn smk_flour_shop.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - django_static:/app/staticfiles
      - django_media:/app/media
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DEBUG=False
      - DB_ENGINE=mysql
      - DB_NAME=smk_flour_shop
      - DB_USER=smk_user
      - DB_PASSWORD=smk_password
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started


  celery:
    build: .
    container_name: smk_celery
    restart: always
    command: celery -A smk_flour_shop worker --loglevel=info
    volumes:
      - django_media:/app/media
    environment:
      - DEBUG=False
      - DB_ENGINE=mysql
      - DB_NAME=smk_flour_shop
      - DB_USER=smk_user
      - DB_PASSWORD=smk_password
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started


  nginx:
    image: nginx:alpine
    container_name: smk_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - django_static:/usr/share/nginx/html/static:ro
      - django_media:/usr/share/nginx/html/media:ro
      # Volume for Let's Encrypt certificates
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web

  adminer:
    image: adminer:latest
    container_name: smk_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy


volumes:
  mysql_data:
  django_static:
  django_media:
